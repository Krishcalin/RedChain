<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340" role="img" aria-label="RedChain — Gated, multi-agent red-team engagement orchestrator">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="55%" stop-color="#170808"/>
      <stop offset="100%" stop-color="#2a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="60%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7f1d1d" stop-opacity="0"/>
      <stop offset="20%" stop-color="#dc2626"/>
      <stop offset="80%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#7f1d1d" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="340" fill="url(#bg)"/>

  <!-- subtle radial glow behind title -->
  <ellipse cx="320" cy="170" rx="380" ry="160" fill="url(#glow)"/>

  <!-- top accent bar -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#topBar)"/>
  <!-- bottom accent bar -->
  <rect x="0" y="337" width="1280" height="3" fill="url(#topBar)"/>

  <!-- left content: title + tagline + metadata -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <text x="80" y="150" font-size="92" font-weight="800" fill="#fafafa" letter-spacing="-2">
      <tspan fill="#fafafa">Red</tspan><tspan fill="url(#accent)">Chain</tspan>
    </text>

    <!-- accent underline -->
    <rect x="82" y="170" width="280" height="3" fill="url(#accent)"/>

    <!-- tagline -->
    <text x="80" y="210" font-size="20" fill="#e5e5e5" letter-spacing="0.3">
      Gated, multi-agent red-team engagement orchestrator
    </text>

    <!-- subtitle row -->
    <text x="80" y="244" font-size="14" fill="#a3a3a3" letter-spacing="1">
      one phase  ·  one agent  ·  one validated artifact
    </text>

    <!-- metadata chips -->
    <g font-size="12" font-weight="600" letter-spacing="0.5">
      <g transform="translate(80, 270)">
        <rect width="74" height="22" rx="3" fill="#1f1f1f" stroke="#dc2626" stroke-width="1"/>
        <text x="37" y="15" fill="#fca5a5" text-anchor="middle">PYTHON 3.10+</text>
      </g>
      <g transform="translate(162, 270)">
        <rect width="74" height="22" rx="3" fill="#1f1f1f" stroke="#ef4444" stroke-width="1"/>
        <text x="37" y="15" fill="#fca5a5" text-anchor="middle">ANTHROPIC</text>
      </g>
      <g transform="translate(244, 270)">
        <rect width="50" height="22" rx="3" fill="#1f1f1f" stroke="#f97316" stroke-width="1"/>
        <text x="25" y="15" fill="#fdba74" text-anchor="middle">MIT</text>
      </g>
      <g transform="translate(302, 270)">
        <rect width="56" height="22" rx="3" fill="#1f1f1f" stroke="#f97316" stroke-width="1"/>
        <text x="28" y="15" fill="#fdba74" text-anchor="middle">v0.1.0</text>
      </g>
    </g>
  </g>

  <!-- right content: 9-phase chain -->
  <g transform="translate(660, 110)" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <!-- horizontal connector line -->
    <line x1="20" y1="60" x2="580" y2="60" stroke="#3f3f46" stroke-width="2" stroke-dasharray="3 4"/>

    <!-- 9 phase nodes: scope, recon, weap, deliv, exploit, install, c2, obj, report -->
    <!-- node template: circle + label above + initial inside -->
    <g filter="url(#softGlow)">
      <!-- scope -->
      <g transform="translate(20, 60)">
        <circle r="20" fill="#1f1f1f" stroke="url(#accent)" stroke-width="2.5"/>
        <text y="5" font-size="14" font-weight="700" fill="#fafafa" text-anchor="middle">S</text>
      </g>
      <!-- recon -->
      <g transform="translate(90, 60)">
        <circle r="20" fill="#1f1f1f" stroke="url(#accent)" stroke-width="2.5"/>
        <text y="5" font-size="14" font-weight="700" fill="#fafafa" text-anchor="middle">R</text>
      </g>
      <!-- weaponize -->
      <g transform="translate(160, 60)">
        <circle r="20" fill="#0a0a0a" stroke="#52525b" stroke-width="2" stroke-dasharray="3 2"/>
        <text y="5" font-size="14" font-weight="700" fill="#71717a" text-anchor="middle">W</text>
      </g>
      <!-- delivery -->
      <g transform="translate(230, 60)">
        <circle r="20" fill="#0a0a0a" stroke="#52525b" stroke-width="2" stroke-dasharray="3 2"/>
        <text y="5" font-size="14" font-weight="700" fill="#71717a" text-anchor="middle">D</text>
      </g>
      <!-- exploit -->
      <g transform="translate(300, 60)">
        <circle r="20" fill="#0a0a0a" stroke="#52525b" stroke-width="2" stroke-dasharray="3 2"/>
        <text y="5" font-size="14" font-weight="700" fill="#71717a" text-anchor="middle">E</text>
      </g>
      <!-- installation -->
      <g transform="translate(370, 60)">
        <circle r="20" fill="#0a0a0a" stroke="#52525b" stroke-width="2" stroke-dasharray="3 2"/>
        <text y="5" font-size="14" font-weight="700" fill="#71717a" text-anchor="middle">I</text>
      </g>
      <!-- c2 -->
      <g transform="translate(440, 60)">
        <circle r="20" fill="#0a0a0a" stroke="#52525b" stroke-width="2" stroke-dasharray="3 2"/>
        <text y="5" font-size="14" font-weight="700" fill="#71717a" text-anchor="middle">C</text>
      </g>
      <!-- objectives -->
      <g transform="translate(510, 60)">
        <circle r="20" fill="#0a0a0a" stroke="#52525b" stroke-width="2" stroke-dasharray="3 2"/>
        <text y="5" font-size="14" font-weight="700" fill="#71717a" text-anchor="middle">O</text>
      </g>
      <!-- report -->
      <g transform="translate(580, 60)">
        <circle r="20" fill="#1f1f1f" stroke="url(#accent)" stroke-width="2.5"/>
        <text y="5" font-size="14" font-weight="700" fill="#fafafa" text-anchor="middle">R</text>
      </g>
    </g>

    <!-- labels under each node -->
    <g font-size="10" fill="#a3a3a3" text-anchor="middle" letter-spacing="0.5">
      <text x="20"  y="100">scope</text>
      <text x="90"  y="100">recon</text>
      <text x="160" y="100">weaponize</text>
      <text x="230" y="100">delivery</text>
      <text x="300" y="100">exploit</text>
      <text x="370" y="100">install</text>
      <text x="440" y="100">c2</text>
      <text x="510" y="100">objectives</text>
      <text x="580" y="100">report</text>
    </g>

    <!-- gate markers between nodes (small dots) -->
    <g fill="#dc2626">
      <circle cx="55"  cy="60" r="2"/>
      <circle cx="125" cy="60" r="2"/>
      <circle cx="195" cy="60" r="2" fill="#52525b"/>
      <circle cx="265" cy="60" r="2" fill="#52525b"/>
      <circle cx="335" cy="60" r="2" fill="#52525b"/>
      <circle cx="405" cy="60" r="2" fill="#52525b"/>
      <circle cx="475" cy="60" r="2" fill="#52525b"/>
      <circle cx="545" cy="60" r="2" fill="#52525b"/>
    </g>

    <!-- caption under chain -->
    <text x="300" y="140" font-size="11" fill="#71717a" text-anchor="middle" letter-spacing="1">
      MVP v0.1.0 — 3/9 phases wired (scope · recon · report)
    </text>
  </g>
</svg>
